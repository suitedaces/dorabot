<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        var palette = localStorage.getItem('palette');
        var legacyMap = {
          'catppuccin-latte': 'mocha-light',
          'catppuccin-mocha': 'mocha-dark',
          'rose-pine-dawn': 'ocean-light',
          'rose-pine': 'ocean-dark'
        };
        var validPalettes = [
          'default-light',
          'default-dark',
          'mocha-light',
          'mocha-dark',
          'sage-light',
          'sage-dark',
          'ocean-light',
          'ocean-dark',
          'berry-light',
          'berry-dark'
        ];
        var darkPalettes = ['default-dark', 'mocha-dark', 'sage-dark', 'ocean-dark', 'berry-dark'];
        var savedTheme = localStorage.getItem('theme');
        var prefersDark = savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (palette && legacyMap[palette]) {
          palette = legacyMap[palette];
        }
        if (!palette || validPalettes.indexOf(palette) === -1) {
          palette = prefersDark ? 'default-dark' : 'default-light';
        }

        if (darkPalettes.indexOf(palette) !== -1) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        document.documentElement.setAttribute('data-palette', palette);
        localStorage.setItem('palette', palette);
        localStorage.setItem('theme', darkPalettes.indexOf(palette) !== -1 ? 'dark' : 'light');
        if (localStorage.getItem('glass') === 'true') document.documentElement.setAttribute('data-glass', 'true');
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/dorabot.png" />
    <title>dorabot</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
