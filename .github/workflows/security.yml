name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9am UTC

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: npm audit (root)
        run: npm audit --audit-level=high

      - name: npm audit (desktop)
        run: npm audit --audit-level=high
        working-directory: desktop

  pin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject unpinned dependencies
        run: |
          FAIL=0
          for f in package.json desktop/package.json desktop/resources/gateway/package.json site/package.json; do
            if grep -P '"[\^~><=]' "$f" | grep -v '"engines"' | grep -v '"node"'; then
              echo "::error file=$f::Found unpinned dependency versions (^ or ~ ranges)"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "All dependencies must use exact versions (no ^ or ~ prefixes)."
            echo "Run: npm install <pkg>@<version> --save-exact"
            exit 1
          fi
          echo "All dependency versions are pinned."

  package-age:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check package age (root, 7 days)
        run: node scripts/check-package-age.mjs --min-days=7 --dir=.

      - name: Check package age (desktop, 7 days)
        run: node scripts/check-package-age.mjs --min-days=7 --dir=desktop

      - name: Check package age (gateway, 7 days)
        run: node scripts/check-package-age.mjs --min-days=7 --dir=desktop/resources/gateway

      - name: Check package age (site, 7 days)
        run: node scripts/check-package-age.mjs --min-days=7 --dir=site

  snyk:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci && cd desktop && npm ci && cd resources/gateway && npm ci

      - name: Run Snyk (all projects)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --strict-out-of-sync=false --severity-threshold=high
