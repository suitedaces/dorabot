name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9am UTC

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: Audit and auto-fix
        run: |
          FIXED=0

          # Root
          if ! npm audit --audit-level=high > /dev/null 2>&1; then
            echo "::warning::Root has high-severity vulns, running npm audit fix"
            npm audit fix || true
            FIXED=1
          fi

          # Desktop
          if ! npm audit --audit-level=high --prefix desktop > /dev/null 2>&1; then
            echo "::warning::Desktop has high-severity vulns, running npm audit fix"
            cd desktop && npm audit fix || true && cd ..
            FIXED=1
          fi

          if [ "$FIXED" -eq 1 ] && [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            git diff --quiet -- '*.json' || {
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add package.json package-lock.json desktop/package.json desktop/package-lock.json
              git commit -m "fix(deps): auto-fix audit vulnerabilities" || true
              git push
              echo "::notice::Pushed auto-fix commit"
            }
          fi

          # Final check: fail if vulns remain after fix
          npm audit --audit-level=high
          cd desktop && npm audit --audit-level=high

  pin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Reject unpinned dependencies
        run: |
          FAIL=0
          for f in package.json desktop/package.json site/package.json; do
            if grep -P '"[\^~><=]' "$f" | grep -v '"engines"' | grep -v '"node"'; then
              echo "::error file=$f::Found unpinned dependency versions (^ or ~ ranges)"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "All dependencies must use exact versions (no ^ or ~ prefixes)."
            echo "Run: npm install <pkg>@<version> --save-exact"
            exit 1
          fi
          echo "All dependency versions are pinned."

  package-age:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      # First-party agent SDK/CLI packages are exempt because these integrations
      # intentionally track upstream releases quickly. All other deps must
      # clear the 7-day quarantine.
      - name: Check package age (root, 7 days)
        run: node scripts/check-package-age.mjs --min-days=7 --dir=. --allow=@anthropic-ai/claude-agent-sdk,@openai/codex

      - name: Check package age (desktop, 7 days)
        run: node scripts/check-package-age.mjs --min-days=7 --dir=desktop --allow=@anthropic-ai/claude-agent-sdk,@openai/codex

      - name: Check package age (site, 7 days)
        run: node scripts/check-package-age.mjs --min-days=7 --dir=site --allow=@anthropic-ai/claude-agent-sdk,@openai/codex

  snyk:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci && cd desktop && npm ci

      - name: Run Snyk (all projects)
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --strict-out-of-sync=false --severity-threshold=high
