name: Build & Notarize

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: Sync desktop version
        run: |
          ROOT_VERSION=$(jq -r .version ../package.json)
          jq --arg v "$ROOT_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "Synced desktop/package.json to $ROOT_VERSION"
        working-directory: desktop

      - name: Delete existing release if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release delete "$TAG" --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

      - name: Build & Package
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run bundle-gateway
          npx electron-vite build
          npx electron-builder --mac --arm64 --publish always
        working-directory: desktop

      - name: Verify code signature
        run: |
          APP=$(find desktop/release -maxdepth 2 -name 'dorabot.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found in release directory"
            exit 1
          fi
          echo "Verifying: $APP"
          codesign --verify --strict --verbose=2 "$APP"
          SIG_INFO=$(codesign -d --verbose=2 "$APP" 2>&1)
          if echo "$SIG_INFO" | grep -q "Signature=adhoc"; then
            echo "::error::App is ad-hoc signed (no certificate). This will break auto-updates."
            echo "::error::Ensure CSC_LINK and CSC_KEY_PASSWORD secrets are configured."
            exit 1
          fi
          if ! echo "$SIG_INFO" | grep -q "Authority=Developer ID Application"; then
            echo "::error::App is not signed with a Developer ID certificate."
            echo "$SIG_INFO"
            exit 1
          fi
          TEAM=$(echo "$SIG_INFO" | grep "TeamIdentifier=" | head -1)
          AUTHORITY=$(echo "$SIG_INFO" | grep "Authority=Developer ID Application" | head -1)
          echo "Signature OK: $AUTHORITY ($TEAM)"

      - name: Add release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "$PREV_TAG".."$TAG" --oneline --no-merges)
          else
            NOTES=$(git log --oneline --no-merges -20)
          fi
          gh release edit "$TAG" --notes "$NOTES" --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

      - name: Upload DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dorabot-dmg
          path: desktop/release/*.dmg

      - name: Upload ZIP
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dorabot-zip
          path: desktop/release/*.zip
